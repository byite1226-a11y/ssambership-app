name: ssambership_app
description: "쌤버십 모바일 앱 — 기존 웹(Next.js)의 컴패니언. 읽기 중심·Commerce-Zero(앱 내 결제 없음)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # 백엔드: 기존 웹과 공유하는 Supabase 1개 (앱은 읽기 중심)
  supabase_flutter: ^2.5.0

  # 라우팅 골격
  go_router: ^14.2.0

  # .env 로딩 (URL/anon key는 코드에 하드코딩하지 않는다)
  flutter_dotenv: ^5.1.0

  # web_bridge: 결제/구독이 필요할 때 '웹 페이지'만 연다 (앱에서 결제하지 않음)
  url_launcher: ^6.3.0

  # 질문 첨부: 갤러리에서 이미지 선택(업로드는 Storage 버킷 준비 시 동작 — graceful)
  image_picker: ^1.1.2

  # 연결노트 필기·스캔 주석(S13~): 필압·팜리젝션·undo/redo·JSON직렬화·PNG export 내장
  # (기획서 4-2 권장안. 온디바이스·무료. 어댑터: lib/core/ink/scribble_ink_adapter.dart)
  scribble: ^0.10.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 런처 아이콘 생성(브랜딩) — 소스 PNG 1개에서 Android/iOS 아이콘 생성.
  flutter_launcher_icons: ^0.13.1

# 앱 로고(확정 브랜드) → Android·iOS 런처 아이콘. 순백 배경(iOS는 alpha 제거).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/ssambership_logo_1024.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
